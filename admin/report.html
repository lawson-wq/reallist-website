<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seller Report Template | Reallist</title><link rel="stylesheet" href="../styles.css"></head><body><section class="section"><h1 class="h1" style="font-size:52px">Seller Weekly Report Template</h1><p class="lead">MVP version. For live automation, connect enquiry forms to Airtable/Fillout and generate this report from Airtable records.</p><div class="panel"><form class="form" oninput="render()"><input class="input" id="property" placeholder="Property address"><input class="input" id="week" placeholder="Week ending"><input class="input" id="views" placeholder="Listing views"><input class="input" id="enquiries" placeholder="Enquiries"><input class="input" id="docs" placeholder="Document requests"><input class="input" id="viewings" placeholder="Viewings"><input class="input" id="offers" placeholder="Offers"><textarea class="textarea" id="feedback" placeholder="Buyer feedback"></textarea><textarea class="textarea" id="action" placeholder="Recommended next action"></textarea></form></div><div class="panel" id="output"></div></section><script>function render(){output.innerHTML=`<h2>${property.value||'Property'} | Weekly Seller Report</h2><p><b>Week ending:</b> ${week.value}</p><table class="table"><tr><td>Listing views</td><td>${views.value}</td></tr><tr><td>Enquiries</td><td>${enquiries.value}</td></tr><tr><td>Document requests</td><td>${docs.value}</td></tr><tr><td>Viewings</td><td>${viewings.value}</td></tr><tr><td>Offers</td><td>${offers.value}</td></tr></table><h3>Buyer feedback</h3><p>${feedback.value}</p><h3>Recommended next action</h3><p>${action.value}</p>`} render()</script></body></html>
